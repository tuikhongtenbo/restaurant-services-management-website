# ================================================
# Restaurant Management - Main Config
# ================================================
spring:
  application:
    name: restaurant-management

  profiles:
    active: dev

  jpa:
    open-in-view: false          # TUY CHON: false de tranh LazyInitializationException
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: validate          # Chi kiem tra schema, khong tu tao (dung initdb.sql)
    show-sql: false

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

  jackson:
    default-property-inclusion: non_null

logging:
  level:
    com.restaurant: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
